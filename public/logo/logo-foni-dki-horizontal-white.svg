<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <g transform="translate(10, 10)">
    <!-- Abstract Orienteering Symbol -->
    <path d="M20 0 L80 0 L100 50 L80 100 L20 100 L0 50 Z" fill="#0F172A" stroke="#FFFFFF" stroke-width="8"/>
    <!-- Split color inside -->
    <path d="M20 0 L100 50 L80 100 L0 50 Z" fill="#F59E0B" opacity="0.9"/>
    <!-- Map marker / point dot -->
    <circle cx="50" cy="50" r="12" fill="#FFFFFF"/>
    
    <!-- Text: FONI -->
    <text x="130" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="-2">FONI</text>
    
    <!-- Text: DKI -->
    <text x="300" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="72" fill="#F59E0B" letter-spacing="-2">DKI</text>
  </g>
</svg>